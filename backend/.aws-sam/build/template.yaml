AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: echofriendly-backend SAM Template
Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: nodejs20.x
    Architectures:
    - x86_64
Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
  CategoriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: categoryId
        AttributeType: S
      KeySchema:
      - AttributeName: categoryId
        KeyType: HASH
  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: productId
        AttributeType: S
      - AttributeName: categoryId
        AttributeType: S
      KeySchema:
      - AttributeName: productId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: CategoryIndex
        KeySchema:
        - AttributeName: categoryId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  OrdersTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: orderId
        Type: String
  EchoMediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
        - AllowedHeaders:
          - '*'
          AllowedMethods:
          - GET
          - PUT
          - POST
          - DELETE
          - HEAD
          AllowedOrigins:
          - '*'
          MaxAge: 3600
  EchoMediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: EchoMediaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal: '*'
          Action: s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::${EchoMediaBucket}/*
  EchoHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              audience:
              - Ref: EchoUserPoolClient
              issuer:
                Fn::Sub: https://cognito-idp.${AWS::Region}.amazonaws.com/${EchoUserPool}
      CorsConfiguration:
        AllowOrigins:
        - https://echofriendly.netlify.app
        - http://localhost:5173
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        AllowHeaders:
        - Content-Type
        - Authorization
        MaxAge: 3600
  EchoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      AutoVerifiedAttributes:
      - email
      UsernameAttributes:
      - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireUppercase: true
  EchoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: EchoFriendlyWebClient
      UserPoolId:
        Ref: EchoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
      - ALLOW_USER_SRP_AUTH
      - ALLOW_REFRESH_TOKEN_AUTH
      - ALLOW_USER_PASSWORD_AUTH
      AccessTokenValidity: 15
      IdTokenValidity: 15
      RefreshTokenValidity: 15
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
  ProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ProfileFunction
      Handler: handlers/profile.handler
      Environment:
        Variables:
          USERS_TABLE:
            Ref: UsersTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UsersTable
      Events:
        GetProfile:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /profile
            Method: GET
        UpdateProfile:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /profile
            Method: POST
    Metadata:
      SamResourceId: ProfileFunction
  InventoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: InventoryFunction
      Handler: handlers/inventory.handler
      Environment:
        Variables:
          CATEGORIES_TABLE:
            Ref: CategoriesTable
          PRODUCTS_TABLE:
            Ref: ProductsTable
          MEDIA_BUCKET:
            Ref: EchoMediaBucket
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: CategoriesTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ProductsTable
      - S3WritePolicy:
          BucketName:
            Ref: EchoMediaBucket
      - S3ReadPolicy:
          BucketName:
            Ref: EchoMediaBucket
      Events:
        InventoryApi:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /inventory/{proxy+}
            Method: ANY
        InventoryOptions:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /inventory/{proxy+}
            Method: OPTIONS
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: InventoryFunction
  OrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: OrdersFunction
      Handler: handlers/orders.handler
      Environment:
        Variables:
          ORDERS_TABLE:
            Ref: OrdersTable
          PRODUCTS_TABLE:
            Ref: ProductsTable
          RAZORPAY_KEY_ID: rzp_live_Si0FNwKgjvHkT1
          RAZORPAY_KEY_SECRET: 71v4wJXOx0U2KmwTcw2Yw8p7
          RAZORPAY_WEBHOOK_SECRET: echofriendlysecret
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: OrdersTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: ProductsTable
      Events:
        CreateOrder:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /orders/create
            Method: POST
        VerifyPayment:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /orders/verify
            Method: POST
        Webhook:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /orders/webhook
            Method: POST
            Auth:
              Authorizer: NONE
        ListOrders:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /orders/list
            Method: GET
        ListUserOrders:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /orders/user-list
            Method: GET
        UpdateOrderStatus:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: EchoHttpApi
            Path: /orders/status
            Method: PUT
    Metadata:
      SamResourceId: OrdersFunction
Outputs:
  ApiEndpoint:
    Value:
      Fn::Sub: https://${EchoHttpApi}.execute-api.${AWS::Region}.amazonaws.com/
  UserPoolId:
    Value:
      Ref: EchoUserPool
  UserPoolClientId:
    Value:
      Ref: EchoUserPoolClient
